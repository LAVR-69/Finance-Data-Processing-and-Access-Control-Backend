version: "3.8"

services:
 backend:
  build: .
  container_name: finance_backend
  ports:
    - "8000:8000"
  env_file:
   -.env
  volumes:
   -.:/app
  depends_on:
   - db
  restart: always


 db:
  image: postgres:14
  container_name: finance_db
  restart: always
  environment:
   POSTGRES_USER: admin
   POSTGRES_PASSWORD: ****
   POSTGRES_DB: finance_db
  ports:
   - "5432:5432"
  volumes:
   - postgres_data:/var/lib/postgresql/data


volumes:
 postgres_data
